<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Homepage</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* Background*/
            background:
                repeating-linear-gradient(45deg,
                    #ffffff 0, #ffffff 25px,
                    #000000 25px, #000000 50px),
                repeating-linear-gradient(-45deg,
                    #ffffff 0, #ffffff 25px,
                    #000000 25px, #000000 50px);
        }

        header {
            background: #111111;
            color: white;
            text-align: center;
            padding: 1em 0;
        }

        .container {
            flex-grow: 1;
            /* Adjusted to take available space */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1em;
        }

        button {
            background-color: #4d0690;
            color: white;
            padding: 15px 25px;
            margin: 10px;
            border: none;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #fc5959;
        }

        a {
            text-decoration: none;
            color: white;
        }

        footer {
            background-color: #111111;
            color: white;
            text-align: left;
            padding: 0.5em;
            width: 100%;
            font-size: 0.8em;
            line-height: 1.4em;
        }

        .footer-div {
            margin-bottom: 0.5em;
        }
    </style>
</head>

<body>
    <header>
        <a href="https://zauchnerp.github.io/index.html" target="_self" class="header-link">
            <h1>  </h1>
        </a>
    </header>

    <div class="container">

        <button>
            <a href="https://zauchnerp.github.io/gmoTree/" target="_blank">
                gmoTree homepage
            </a>
        </button>

    </div>

    <footer>
        <div class="footer-div">
            <strong>
                <center>
                    <a target="_self" href="https://zauchnerp.github.io/impressum.html" target="_blank">
                        site notice
                    </a>
                </center>
            </strong>
        </div>
    </footer>
</body>

</html>
